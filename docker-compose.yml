services:
  postgres:
    image: postgres:16-alpine
    container_name: community-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: community_db
      POSTGRES_USER: community
      POSTGRES_PASSWORD: community
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U community -d community_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
